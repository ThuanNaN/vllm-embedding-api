name: Generate API Docs

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Install deps
        run: pip install -r requirements-docs.txt

      - name: Export OpenAPI
        run: python scripts/export_openapi.py

      - name: Move docs
        run: cp openapi.json docs/

      - name: Download Swagger UI assets
        run: |
          mkdir -p docs/vendor/swagger-ui-dist
          npm install swagger-ui-dist@5.18.2
          cp node_modules/swagger-ui-dist/swagger-ui.css docs/vendor/swagger-ui-dist/
          cp node_modules/swagger-ui-dist/swagger-ui-bundle.js docs/vendor/swagger-ui-dist/

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
